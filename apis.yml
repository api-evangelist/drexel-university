    properties:
      - url: https://drexel.edu/it/services/catalog/drexelone-portal/
        type: Documentation
      - url: https://one.drexel.edu
        type: Portal
    description: >-
      DrexelOne is the university's single-sign-on portal for students, faculty, and
      staff, backed by Ellucian Banner. It surfaces BannerWeb data — personal
      information, grades, schedules, financial aid, employment, and payroll —
      through DrexelConnect authentication. No public developer API or integration
      documentation is published; access is internal and request-based via the IT
      Help Desk.
