description: >-
  Drexel University is a private research university in Philadelphia, Pennsylvania,
  with roughly 24,000 students and a Carnegie R1 (very high research activity)
  classification. Drexel is internationally known for its cooperative education
  (co-op) program, which embeds full-time professional work experience into
  undergraduate degrees. Core enterprise systems run on Ellucian Banner, surfaced
  to students and staff through the DrexelOne portal. Drexel does not publish a
  public developer API, OpenAPI specification, SDK, or open data portal; the
  organization's GitHub org (drexel-university) currently lists no public
  repositories, and library, catalog, and IT service pages do not expose
  documented integration endpoints. This profile is maintained as a tier-3
  no-public-API index entry.
