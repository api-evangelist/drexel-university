    name: Drexel Course Catalog
    tags:
      - Higher Education
      - Course Catalog
    humanURL: https://catalog.drexel.edu
    properties:
      - url: https://catalog.drexel.edu
        type: Documentation
      - url: https://termmasterschedule.drexel.edu
        type: WebApp
    description: >-
      The Drexel Course Catalog and Term Master Schedule (WebTMS) are published
      as web interfaces only. The catalog is explicitly online-only with no
      documented machine-readable feed; the Term Master Schedule provides a
      browseable interface but no public REST or JSON endpoint.
